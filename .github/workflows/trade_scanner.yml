name: Trading Signal Scanner

# ── Schedule ─────────────────────────────────────────────────────────────────
# Runs every hour Mon–Fri from 9:35 AM to 3:35 PM Eastern Time (ET).
# GitHub Actions cron uses UTC. ET = UTC-4 (EDT, Mar–Nov) / UTC-5 (EST, Nov–Mar).
# We schedule for EDT (UTC-4) to cover daylight saving time (most of the year).
#
#   9:35 AM ET  = 13:35 UTC
#  10:35 AM ET  = 14:35 UTC
#  11:35 AM ET  = 15:35 UTC
#  12:35 PM ET  = 16:35 UTC
#   1:35 PM ET  = 17:35 UTC
#   2:35 PM ET  = 18:35 UTC
#   3:35 PM ET  = 19:35 UTC
#
# NOTE: During EST (winter, UTC-5), these fire one hour late.
# The job itself guards against this with a market-hours check.

on:
  schedule:
    - cron: "35 13 * * 1-5"   #  9:35 AM ET
    - cron: "35 14 * * 1-5"   # 10:35 AM ET
    - cron: "35 15 * * 1-5"   # 11:35 AM ET
    - cron: "35 16 * * 1-5"   # 12:35 PM ET
    - cron: "35 17 * * 1-5"   #  1:35 PM ET
    - cron: "35 18 * * 1-5"   #  2:35 PM ET
    - cron: "35 19 * * 1-5"   #  3:35 PM ET

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe to scan"
        required: false
        default: "sp500"
        type: choice
        options:
          - sp500
          - nasdaq100
          - dowjones
      max_tickers:
        description: "Max tickers to scan (0 = all)"
        required: false
        default: "0"
      top_n:
        description: "Top N conviction picks"
        required: false
        default: "5"
      skip_email:
        description: "Skip email notification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_sms:
        description: "Skip SMS notification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Prevent overlapping runs ──────────────────────────────────────────────────
concurrency:
  group: trading-scanner
  cancel-in-progress: false   # let the current run finish

jobs:
  scan:
    name: "Hourly Scan — ${{ github.event.inputs.universe || 'sp500' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check market hours (skip outside window) ───────────────────────
      - name: Check market hours
        id: market_check
        run: |
          # Determine current ET time (handle both EDT and EST)
          ET_HOUR=$(TZ="America/New_York" date +%-H)
          ET_MIN=$(TZ="America/New_York" date +%-M)
          ET_DOW=$(TZ="America/New_York" date +%u)   # 1=Mon … 5=Fri
          ET_TIME_MINS=$(( ET_HOUR * 60 + ET_MIN ))
          MARKET_OPEN_MINS=$(( 9 * 60 + 30 ))   # 9:30 AM
          MARKET_CLOSE_MINS=$(( 16 * 60 + 0 ))  # 4:00 PM (buffer)

          echo "ET time: $(TZ='America/New_York' date '+%Y-%m-%d %H:%M %Z')"
          echo "Day of week: $ET_DOW (1=Mon, 5=Fri)"

          if [ "$ET_DOW" -ge 1 ] && [ "$ET_DOW" -le 5 ] && \
             [ "$ET_TIME_MINS" -ge "$MARKET_OPEN_MINS" ] && \
             [ "$ET_TIME_MINS" -le "$MARKET_CLOSE_MINS" ]; then
            echo "in_market_hours=true" >> $GITHUB_OUTPUT
            echo "✅ Market is open — proceeding with scan"
          else
            echo "in_market_hours=false" >> $GITHUB_OUTPUT
            echo "⏭ Outside market hours — skipping scan"
          fi

      # ── 2. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        if: steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      # ── 3. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        if: steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        if: steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Write .env from GitHub Secrets ────────────────────────────────
      # All secrets are stored in GitHub → Settings → Secrets → Actions.
      # NEVER hard-code secrets in this file.
      - name: Write .env from secrets
        if: steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cat > .env << EOF
          # Auto-generated by GitHub Actions — do not commit
          FMP_API_KEY=${{ secrets.FMP_API_KEY }}

          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME=Trading Scanner (GitHub Actions)
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT=Trading Signal Scanner — Hourly Report

          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
          SMS_TO_NUMBERS=${{ secrets.SMS_TO_NUMBERS }}

          LOG_LEVEL=INFO
          OUTPUT_DIR=output
          SAVE_CSV=true
          SAVE_JSON=false
          DEFAULT_UNIVERSE=${{ github.event.inputs.universe || 'sp500' }}
          MAX_TICKERS=${{ github.event.inputs.max_tickers || '0' }}
          FMP_BATCH_SIZE=5
          REQUEST_DELAY_MS=120
          TOP_N_PICKS=${{ github.event.inputs.top_n || '5' }}
          EOF
          echo ".env written ✅"

      # ── 6. Create output directory ────────────────────────────────────────
      - name: Create output directory
        if: steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch'
        run: mkdir -p output

      # ── 7. Run scanner ────────────────────────────────────────────────────
      - name: Run trading signal scanner
        if: steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          UNIVERSE="${{ github.event.inputs.universe || 'sp500' }}"
          MAX="${{ github.event.inputs.max_tickers || '0' }}"
          TOP="${{ github.event.inputs.top_n || '5' }}"
          SKIP_EMAIL="${{ github.event.inputs.skip_email || 'false' }}"
          SKIP_SMS="${{ github.event.inputs.skip_sms || 'false' }}"

          CMD="python main.py --universe $UNIVERSE --top $TOP"

          if [ "$MAX" != "0" ]; then
            CMD="$CMD --max $MAX"
          fi
          if [ "$SKIP_EMAIL" = "true" ]; then
            CMD="$CMD --no-email"
          fi
          if [ "$SKIP_SMS" = "true" ]; then
            CMD="$CMD --no-sms"
          fi

          echo "Running: $CMD"
          $CMD

      # ── 8. Upload output artifacts ────────────────────────────────────────
      - name: Upload scan results
        if: (steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch') && always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/*.xlsx
            output/*.csv
            output/*.json
          retention-days: 30
          if-no-files-found: warn

      # ── 9. Notify on failure ──────────────────────────────────────────────
      - name: Notify on failure
        if: failure() && (steps.market_check.outputs.in_market_hours == 'true' || github.event_name == 'workflow_dispatch')
        run: |
          echo "::error::Trading scanner job failed at $(TZ='America/New_York' date '+%Y-%m-%d %H:%M ET')"
          echo "Check the run logs above for details."
